name: Generate GitHub Metrics SVG

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Profile details card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdrenalineY
          filename: github-metrics/base.svg
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Shanghai

      - name: Language indepth
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdrenalineY
          filename: github-metrics/languages.indepth.svg
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size
          plugin_languages_limit: 6

      - name: Full-year isocalendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdrenalineY
          filename: github-metrics/isocalendar.fullyear.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Activity view
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdrenalineY
          filename: github-metrics/activity.svg
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 6
          plugin_activity_days: 0
          plugin_activity_filter: issue, pr, release, fork, review, ref/create

      - name: Reactions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdrenalineY
          filename: github-metrics/reactions.svg
          base: ""
          plugin_reactions: yes
          plugin_reactions_limit: 200

      - name: Follow-up indepth
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdrenalineY
          filename: github-metrics/followup.indepth.svg
          base: ""
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes

      - name: Pinned repositories
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdrenalineY
          filename: github-metrics/repositories.pinned.svg
          base: ""
          plugin_repositories: yes
          plugin_repositories_pinned: 6

      - name: WakaTime
        if: ${{ secrets.WAKATIME_API_KEY != '' }}
        continue-on-error: true
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdrenalineY
          filename: github-metrics/wakatime.svg
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_limit: 6
          plugin_wakatime_days: 7

      - name: StackOverflow
        continue-on-error: true
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdrenalineY
          filename: github-metrics/stackoverflow.svg
          base: ""
          plugin_stackoverflow: yes
          plugin_stackoverflow_limit: 3

      - name: Stars
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdrenalineY
          filename: github-metrics/stars.svg
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 4

      - name: Stargazers chart
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdrenalineY
          filename: github-metrics/stargazers.chartist.svg
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts_type: chartist

      - name: Full calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdrenalineY
          filename: github-metrics/calendar.full.svg
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 1
